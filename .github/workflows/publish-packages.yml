name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: bun run check

      - name: Verify tag version matches packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node - <<'EOF' "$VERSION"
          const fs = require("node:fs");
          const path = require("node:path");
          const version = process.argv[2];
          const root = process.cwd();
          const files = [
            path.join(root, "package.json"),
            path.join(root, "packages/core/package.json"),
            path.join(root, "packages/templates/package.json"),
            path.join(root, "packages/cli/package.json"),
          ];
          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            if (pkg.version !== version) {
              throw new Error(`${file} version ${pkg.version} does not match tag ${version}`);
            }
          }
          const cliPkg = JSON.parse(fs.readFileSync(path.join(root, "packages/cli/package.json"), "utf8"));
          if (cliPkg.dependencies?.["@cli-skill/core"] !== `^${version}`) {
            throw new Error(`packages/cli/package.json dependency @cli-skill/core=${cliPkg.dependencies?.["@cli-skill/core"]} does not match ^${version}`);
          }
          EOF

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-beta-"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @cli-skill/core
        run: npm publish ./packages/core --access public --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cli-skill/templates
        run: npm publish ./packages/templates --access public --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cli-skill/cli
        run: npm publish ./packages/cli --access public --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
