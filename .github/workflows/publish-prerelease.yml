name: Publish Prerelease Packages

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.verify.outputs.should_publish }}
      version: ${{ steps.verify.outputs.version }}
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify prerelease version
        id: verify
        run: bun ./scripts/verify-publish-state.ts prerelease >> "$GITHUB_OUTPUT"

      - name: Discover publish packages
        id: packages
        run: bun ./scripts/list-publish-packages.ts >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: npm-prerelease
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish ${{ matrix.pkg.name }}
        run: bun publish --cwd ${{ matrix.pkg.path }} --access public --tag beta
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
