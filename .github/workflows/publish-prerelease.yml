name: Publish Prerelease Packages

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.verify.outputs.should_publish }}
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: bun run check

      - name: Verify prerelease version
        id: verify
        run: bun ./scripts/verify-publish-state.ts prerelease >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: npm-prerelease
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish @cli-skill/core
        run: bun publish ./packages/core --access public --tag beta
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cli-skill/templates
        run: bun publish ./packages/templates --access public --tag beta
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cli-skill/cli
        run: bun publish ./packages/cli --access public --tag beta
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
