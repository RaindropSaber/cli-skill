name: Publish Release Packages

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workspace
        run: bun run check

      - name: Verify tag version matches packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun ./scripts/verify-publish-state.ts release "$VERSION"

      - name: Publish @cli-skill/core
        run: bun publish ./packages/core --access public --tag latest
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cli-skill/templates
        run: bun publish ./packages/templates --access public --tag latest
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @cli-skill/cli
        run: bun publish ./packages/cli --access public --tag latest
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
