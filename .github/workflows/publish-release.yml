name: Publish Release Packages

on:
  push:
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag version matches packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun ./scripts/verify-publish-state.ts release "$VERSION"

      - name: Discover publish packages
        id: packages
        run: bun ./scripts/list-publish-packages.ts >> "$GITHUB_OUTPUT"

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.prepare.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish ${{ matrix.pkg.name }}
        run: bun publish --cwd ${{ matrix.pkg.path }} --access public --tag latest
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
